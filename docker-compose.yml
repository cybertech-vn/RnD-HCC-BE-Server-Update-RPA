version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: rnd-kiosk-setup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
    ports:
      # Bind vào localhost để bảo mật, tránh bị public thẳng ra Internet
      - "15438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - setup-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: rnd-kiosk-setup-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      # Nếu muốn truy cập từ ngoài, đổi thành "9000:9000" và "9001:9001"
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/minio-data
    command: server /minio-data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - setup-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Go Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rnd-kiosk-setup-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/config.yml
    ports:
      # API public ra ngoài nên giữ nguyên
      - "7878:7878"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./log:/app/log
    networks:
      - setup-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  minio_data:

networks:
  setup-network:
    driver: bridge
